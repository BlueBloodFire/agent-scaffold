<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - Agent Scaffold</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,.12);
      padding: 40px 36px;
      width: 360px;
    }
    h2 { text-align: center; margin-bottom: 28px; color: #1a1a1a; font-size: 22px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    input:focus { border-color: #4096ff; }
    .hint { font-size: 12px; color: #aaa; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 10px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #4096ff; }
    .error { color: #ff4d4f; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Agent Scaffold 登录</h2>
    <label>用户名</label>
    <input id="username" type="text" value="admin" placeholder="用户名" />
    <label>密码</label>
    <input id="password" type="password" value="admin" placeholder="密码" />
    <p class="hint">演示账号：admin / admin</p>
    <button onclick="doLogin()">登 录</button>
    <p class="error" id="errMsg"></p>
  </div>

  <script>
    function doLogin() {
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value.trim();
      if (u === 'admin' && p === 'admin') {
        // 写 cookie：ai_agent_login=userId，有效期 1 天
        var expires = new Date(Date.now() + 86400000).toUTCString();
        document.cookie = 'ai_agent_login=admin; path=/; expires=' + expires;
        window.location.href = 'index.html';
      } else {
        document.getElementById('errMsg').textContent = '用户名或密码错误';
      }
    }

    // 回车触发登录
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
